<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE IDENTITY | MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/register.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="p-6">
    <div id="canvas-container"></div>
    <div class="scanlines"></div>

    <!-- Terminal Boot Overlay -->
    <div id="boot-overlay">
        <div id="boot-log" class="max-w-2xl mx-auto w-full"></div>
    </div>

    <div id="toastContainer"></div>

    <div class="max-w-md w-full cyber-panel p-10 relative">
        <div class="cyber-corner corner-tl"></div>
        <div class="cyber-corner corner-br"></div>

        <div class="mb-8 text-center">
            <h1 class="text-4xl font-black text-white italic tracking-tighter uppercase">Create_ID</h1>
            <p class="mono text-[10px] text-emerald-500 mt-2 tracking-widest uppercase"><i class="fas fa-lock text-[9px] mr-1"></i> Offline Vault Generation</p>
            <div class="h-1 w-24 bg-blue-500 mx-auto mt-2 rounded-full opacity-50"></div>
        </div>

        <form id="registerForm" class="space-y-5">
            <div>
                <label class="mono text-[10px] text-blue-400 uppercase tracking-widest ml-1 mb-2 block">Username</label>
                <input type="text" id="username" required minlength="3"
                    class="input-cyber w-full py-3 px-4 text-white placeholder-slate-600 rounded-sm"
                    placeholder="GHOST_PROTOCOL">
            </div>

            <div>
                <label class="mono text-[10px] text-blue-400 uppercase tracking-widest ml-1 mb-2 block">Email_Address</label>
                <input type="email" id="email" required
                    class="input-cyber w-full py-3 px-4 text-white placeholder-slate-600 rounded-sm"
                    placeholder="OPERATOR@SECURE.NET">
            </div>

            <div class="space-y-3">
                <label class="mono text-[10px] text-blue-400 uppercase tracking-widest ml-1 block">Offline_Vault_Key</label>
                
                <div class="relative">
                    <input type="password" id="password" required minlength="16" readonly
                        class="input-cyber w-full py-3 pl-4 pr-12 text-emerald-400 placeholder-slate-600 rounded-sm cursor-not-allowed border-emerald-500/30"
                        placeholder="Click Generate to create key...">
                    <button type="button" id="togglePass" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-blue-400 transition-colors">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>

                <!-- Strength Status Bar -->
                <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden">
                    <div id="strengthBar" class="strength-bar bg-red-500"></div>
                </div>

                <!-- Large Generate Button -->
                <button type="button" id="genPass" class="w-full py-3 bg-white/5 border border-emerald-500/30 text-emerald-400 mono text-[10px] uppercase tracking-[0.2em] hover:bg-emerald-500 hover:text-white transition-all duration-300 flex items-center justify-center gap-2">
                    <i class="fas fa-key text-[9px]"></i> Generate_Vault_Key
                </button>

                <p class="mono text-[8px] text-red-400 text-center uppercase tracking-widest mt-2 leading-tight">
                    Warning: This key is heavily encrypted. Master OS cannot recover it if lost.
                </p>
            </div>

            <button type="submit" id="registerBtn" class="btn-cyber w-full py-4 text-white font-bold rounded-sm mt-6 tracking-[0.2em]" disabled>
                AWAITING KEY GENERATION...
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/5 flex justify-between items-center">
            <span class="text-[10px] text-slate-600 uppercase tracking-widest">Active ID?</span>
            <a href="/login" class="mono text-[10px] text-blue-400 hover:text-white transition-all uppercase tracking-widest">
                Return_To_Base_
            </a>
        </div>
    </div>

    <script src="./js/register.js" defer></script>
</body>
</html>
